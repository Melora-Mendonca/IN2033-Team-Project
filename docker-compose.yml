version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ipos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Karkala1998?
      MYSQL_DATABASE: ipos_sa
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  ipos-sa:
    build: .
    container_name: ipos-sa-app
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ipos_sa
      DB_USER: root
      DB_PASSWORD: Karkala1998?
    ports:
      - "8081:8081"
    stdin_open: true
    tty: true

volumes:
  mysql_data: